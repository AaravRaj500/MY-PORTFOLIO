<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arav | Robotics & Cyber Portfolio</title>
    <style>
        :root {
            --bg-dark: #020817;
            --card-bg: #0f172a;
            --emerald: #10b981;
            --text-gray: #94a3b8;
            --border: #1e293b;
        }

        html { scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding-top: 80px;
        }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; 
            background: rgba(2, 8, 23, 0.9);
            backdrop-filter: blur(10px); 
            display: flex; justify-content: space-between;
            align-items: center; padding: 1rem 10%; 
            box-sizing: border-box;
            border-bottom: 1px solid var(--border); 
            z-index: 1000;
        }

        nav .logo { color: var(--emerald); font-weight: bold; font-size: 1.2rem; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-gray); text-decoration: none; margin-left: 25px; font-size: 0.9rem; transition: 0.3s; }
        nav .links a:hover { color: var(--emerald); }

        .container { max-width: 1000px; margin: auto; padding: 2rem; }

        /* --- Hero Section --- */
        .hero { display: flex; align-items: center; justify-content: space-between; min-height: 75vh; gap: 40px; }
        .hero-text h1 { font-size: 5rem; margin: 0; line-height: 1; }
        .hero-text h2 { color: var(--emerald); font-size: 1.8rem; margin: 15px 0; }
        .hero-text p { color: var(--text-gray); max-width: 580px; line-height: 1.8; margin-bottom: 40px; font-size: 1rem; }

        .hero-btns { display: flex; gap: 15px; flex-wrap: wrap; }

        .btn {
            padding: 12px 24px; border-radius: 8px; text-decoration: none; 
            font-weight: bold; transition: all 0.3s ease; border: 1px solid var(--emerald);
            display: inline-block; cursor: pointer;
        }
        .btn-primary { background: var(--emerald); color: #000; }
        .btn-outline { background: transparent; color: var(--emerald); }

        .btn:hover { 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            transform: translateY(-3px);
            background: var(--emerald);
            color: #000;
        }

        /* --- Robot Styling --- */
        .robot-circle {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #064e3b 0%, #020817 80%);
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; border: 1px solid #065f46;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- Project Cards --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .project-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 30px; border-radius: 12px; transition: all 0.3s ease;
            text-decoration: none; color: inherit; display: block;
        }
        .project-card:hover { 
            border-color: var(--emerald); 
            transform: translateY(-8px);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .tag { background: #1e293b; color: var(--emerald); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; margin-right: 5px; }

        /* --- AI Section --- */
        .ai-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 50px; margin-top: 50px; text-align: center; }
        .question-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
        .chip {
            background: #1e293b; border: 1px solid var(--border); color: white;
            padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s;
        }
        .chip:hover { border-color: var(--emerald); background: rgba(16, 185, 129, 0.1); }
        #ai-answer-box { margin-top: 30px; padding: 25px; background: #020817; border-radius: 8px; border-left: 4px solid var(--emerald); display: none; text-align: left; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">晶 ARAV</div>
        <div class="links">
